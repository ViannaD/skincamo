name: Build

# Observação: este workflow usa o Gradle Wrapper (./gradlew), então só
# funciona depois que gradle/wrapper/gradle-wrapper.jar for adicionado ao
# repositório (veja gradle/wrapper/LEIA-ME_gradle-wrapper-jar.txt). Até lá,
# este job vai falhar no passo "Build" com um erro óbvio de jar ausente.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Dar permissão de execução ao gradlew
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Guardar o .jar gerado
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: skincamo-jar
          path: build/libs/*.jar
